name: Capsule Generation CI

on:
  push:
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: uefi_capsule_generation

jobs:
  # ---- Lint (ruff + mypy) across Linux/macOS/Windows -----------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poetry
        run: pipx install poetry

      - name: make lint
        run: make lint

  # ---- End-to-end capsule generation per chip ------------------------
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        target: [qcs6490, qcs8300, qcs9100]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poetry (Linux/macOS)
        if: runner.os != 'Windows'
        run: pipx install poetry
        shell: bash

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y uuid-dev device-tree-compiler build-essential
        shell: bash

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install dtc
        shell: bash

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            base-devel
            git
            make
            unzip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-poetry
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-dtc

      - name: Cache downloaded boot binaries
        uses: actions/cache@v4
        with:
          path: uefi_capsule_generation/build/cache
          key: bootbins-${{ matrix.target }}-${{ matrix.os }}-${{ hashFiles('uefi_capsule_generation/Makefile') }}

      - name: make setup + test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          make setup
          make test TARGET=${{ matrix.target }}
        shell: bash

      - name: make setup + test (Windows/MSYS2)
        if: runner.os == 'Windows'
        # ruff/mypy don't have MSYS2 Python 3.14 wheels and maturin
        # can't build them from source there, so skip the dev group.
        run: |
          make setup POETRY_INSTALL_OPTS=--without=dev
          make test TARGET=${{ matrix.target }} POETRY_INSTALL_OPTS=--without=dev
        shell: msys2 {0}

      - name: Upload generated capsule
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capsule-${{ matrix.target }}-${{ matrix.os }}
          path: uefi_capsule_generation/build/${{ matrix.target }}/capsule_file.cap
          if-no-files-found: warn
